# ============================================================
# Spanish EIT Default Rubric  —  Version 2.0
# ============================================================
# Aligned with Ortega (2000) and Faretta-Stutenberg et al. (2023).
#
# Rules are applied in order; the FIRST matching rule wins.
# Do NOT hardcode scoring values in Python — always change here.
#
# Available condition fields:
#   max_edits                : total_edits <= N
#   max_content_subs         : content_subs <= N  (near-synonyms excluded)
#   min_token_overlap_ratio  : overlap_ratio >= X  (multiset-based)
#   min_content_overlap      : content_overlap >= X  (content words only)
#   min_idea_unit_coverage   : idea_unit_coverage >= X  (Ortega 2000 proxy)
#   max_word_order_penalty   : word_order_penalty <= X  (0=perfect, 1=reordered)
#   min_length_ratio         : length_ratio >= X  (hyp_len / ref_len)
#   hyp_min_tokens           : len(hyp_tokens) >= N
#   is_gibberish             : true/false
#   Parametric: {field}_{op}: value  where op in {eq,ne,lt,le,gt,ge}
# ============================================================

rubric:
  name:    "Spanish EIT Default Rubric"
  version: "2.0"

  # ── Scale ──────────────────────────────────────────────────
  scale:
    max_points_per_item: 4   # 0–4 per sentence

  # ── Rules ──────────────────────────────────────────────────
  rules:

    # ── R0a: Gibberish ─────────────────────────────────────
    # Catches [gibberish], XXX, noise-only responses before any
    # alignment features are considered.
    - id:          R0_gibberish
      description: "Response is transcription noise ([gibberish], XXX, etc.)"
      when:
        is_gibberish: true
      then:
        score: 0

    # ── R0b: Empty or too short ────────────────────────────
    - id:          R0_empty_or_too_short
      description: "Response is empty or has fewer than 2 tokens — no meaningful production"
      when:
        hyp_min_tokens_lt: 2
      then:
        score: 0

    # ── R4: Exact repetition ───────────────────────────────
    # Ortega (2000): Score 4 = exact repetition of the stimulus.
    - id:          R4_perfect
      description: "No edits — response matches target exactly after normalization"
      when:
        max_edits: 0
      then:
        score: 4

    # ── R3a: Meaning fully preserved, minor form errors ────
    # Ortega (2000): Score 3 = meaning fully preserved even with
    # grammatical errors. Near-synonym substitutions (morphological
    # variants, tense shifts) do NOT count as content_subs here.
    - id:          R3_meaning_preserved
      description: "Meaning fully preserved: high IU coverage, no content subs, minor edits only"
      when:
        max_edits:              3
        max_content_subs:       0
        min_idea_unit_coverage: 0.80
      then:
        score: 3

    # ── R3b: Reordered but complete ────────────────────────
    # Word-order variation with full content coverage should not
    # be penalized to score 2 — meaning is preserved per Ortega.
    - id:          R3_reordered_complete
      description: "Content fully present but reordered — meaning preserved despite word order change"
      when:
        min_idea_unit_coverage: 0.90
        max_content_subs:       0
        max_word_order_penalty: 0.50
      then:
        score: 3

    # ── R2a: More than half idea units, meaning inexact ────
    # Ortega (2000): Score 2 = more than half idea units reproduced
    # but meaning is inexact or ambiguous.
    - id:          R2_more_than_half_iu
      description: "More than half idea units reproduced; meaning partially preserved"
      when:
        min_idea_unit_coverage: 0.50
        max_content_subs:       2
        min_length_ratio:       0.40
      then:
        score: 2

    # ── R2b: Good token overlap but some content loss ──────
    - id:          R2_good_overlap_some_loss
      description: "Good overall overlap but content substitutions reduce meaning fidelity"
      when:
        min_token_overlap_ratio: 0.55
        max_content_subs:        2
        min_length_ratio:        0.35
      then:
        score: 2

    # ── R1: Less than half idea units ──────────────────────
    # Ortega (2000): Score 1 = less than half idea units, incomplete
    # or unrelated meaning.
    - id:          R1_less_than_half_iu
      description: "Less than half idea units reproduced — incomplete or unrelated meaning"
      when:
        min_idea_unit_coverage: 0.15
        min_content_overlap:    0.15
        hyp_min_tokens:         2
      then:
        score: 1

    # ── R1b: Some token overlap but very short ─────────────
    - id:          R1_some_overlap_short
      description: "Some recognizable content but very incomplete production"
      when:
        min_token_overlap_ratio: 0.20
        hyp_min_tokens:          2
      then:
        score: 1

    # ── R0: Catchall ───────────────────────────────────────
    # Ortega (2000): Score 0 = no meaningful output, garbled,
    # or minimal repetition.
    - id:          R0_other
      description: "No prior rule matched — insufficient production or completely wrong"
      when: {}
      then:
        score: 0
