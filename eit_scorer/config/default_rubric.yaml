# ============================================================
# Spanish EIT Default Rubric  —  Version 1.0
# ============================================================
# This file is the SINGLE SOURCE OF TRUTH for all scoring logic.
# Rules are applied in order; the FIRST matching rule wins.
# Do NOT hardcode scoring values in Python — always change here.
# ============================================================

rubric:
  name:    "Spanish EIT Default Rubric"
  version: "1.0"

  # ── Scale ──────────────────────────────────────────────────
  scale:
    max_points_per_item: 4   # 0–4 per sentence

  # ── Rules ──────────────────────────────────────────────────
  # Conditions (all must hold — logical AND):
  #   max_edits              : total_edits <= N
  #   max_content_subs       : content_subs <= N
  #   min_token_overlap_ratio: overlap_ratio >= X (0.0–1.0)
  #   hyp_min_tokens         : len(hyp_tokens) >= N
  #   hyp_min_tokens_lt      : len(hyp_tokens) < N  (operator suffix)
  #
  # Parametric operators: _eq _ne _lt _le _gt _ge
  # Examples:
  #   total_edits_le: 2   → total_edits <= 2
  #   content_subs_gt: 1  → content_subs > 1

  rules:

    # ── R0: Empty or too short ─────────────────────────────
    - id:          R0_empty_or_too_short
      description: "Response is empty or has fewer than 2 tokens — no meaningful production"
      when:
        hyp_min_tokens_lt: 2
      then:
        score: 0

    # ── R4: Perfect ────────────────────────────────────────
    - id:          R4_perfect
      description: "No edits — response matches target exactly after normalization"
      when:
        max_edits: 0
      then:
        score: 4

    # ── R3: Minor ──────────────────────────────────────────
    - id:          R3_minor
      description: "1–2 edits, no content word substitutions — minor function word / morpho errors only"
      when:
        max_edits:        2
        max_content_subs: 0
      then:
        score: 3

    # ── R3b: Good overlap, only minor substitutions ────────
    - id:          R3b_minor_with_function_sub
      description: "Up to 2 edits including one function sub, high overlap"
      when:
        max_edits:               2
        max_content_subs:        0
        min_token_overlap_ratio: 0.75
      then:
        score: 3

    # ── R2: Moderate ───────────────────────────────────────
    - id:          R2_moderate
      description: "3–4 edits OR up to 1 content sub — partial production, still recognizable"
      when:
        max_edits:               4
        max_content_subs:        1
        min_token_overlap_ratio: 0.50
      then:
        score: 2

    # ── R2b: Fewer edits but poor overlap ──────────────────
    - id:          R2b_low_overlap_few_edits
      description: "3 edits but overlap drops — still partial credit"
      when:
        max_edits:               3
        min_token_overlap_ratio: 0.40
      then:
        score: 2

    # ── R1: Heavy errors but some overlap ──────────────────
    - id:          R1_heavy_but_some_overlap
      description: "5+ edits or multiple content subs, but learner produced something recognizable"
      when:
        min_token_overlap_ratio: 0.25
        hyp_min_tokens:          2
      then:
        score: 1

    # ── R0: Catchall ───────────────────────────────────────
    - id:          R0_other
      description: "No prior rule matched — insufficient production or completely wrong"
      when: {}
      then:
        score: 0

  # ── Text Processing Configuration ──────────────────────────
  normalization:
    lowercase:                    true
    strip_punctuation:            true
    normalize_whitespace:         true
    fold_diacritics_for_matching: false   # Keep á, ñ, etc. — meaningful in Spanish
    expand_contractions:          true
    strip_filler_words:           true
    filler_words:
      - "eh"
      - "um"
      - "uh"
      - "este"
      - "mm"
      - "mhm"
      - "hmm"
      - "ah"
      - "eeh"
      - "mmm"
    contraction_map:
      del: ["de", "el"]
      al:  ["a",  "el"]

  tokenization:
    split_on_whitespace: true
    keep_apostrophes:    false
    split_enclitics:     true
    enclitics:
      - "selos"
      - "selas"
      - "melos"
      - "melas"
      - "telos"
      - "telas"
      - "noslos"
      - "noslas"
      - "selo"
      - "sela"
      - "melo"
      - "mela"
      - "telo"
      - "tela"
      - "nos"
      - "los"
      - "las"
      - "les"
      - "me"
      - "te"
      - "se"
      - "lo"
      - "la"
      - "le"
      - "os"

  alignment:
    match_score:       2.0
    mismatch_penalty: -1.0
    gap_penalty:      -1.0

  error_labeling:
    function_words:
      # Articles
      - el
      - la
      - los
      - las
      - un
      - una
      - unos
      - unas
      # Prepositions
      - a
      - de
      - en
      - con
      - por
      - para
      - sin
      - sobre
      - entre
      - hasta
      - desde
      - hacia
      - durante
      # Conjunctions
      - que
      - y
      - e
      - o
      - u
      - pero
      - sino
      - si
      - aunque
      - cuando
      - donde
      - como
      - porque
      - mientras
      - después
      - antes
      # Clitics & weak pronouns
      - me
      - te
      - se
      - lo
      - la
      - le
      - nos
      - os
      - los
      - las
      - les
      # Demonstratives
      - este
      - ese
      - aquel
      - esta
      - esa
      - aquella
      - estos
      - esos
      - estas
      - esas
      # Auxiliaries
      - ha
      - han
      - he
      - has
      - había
      - habían
      - ser
      - estar
      - haber
      # Contractions (pre-expansion)
      - del
      - al
